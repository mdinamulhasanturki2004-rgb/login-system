<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard">
<button class="theme-toggle" onclick="toggletheme()"> dark mode</button>
<div class="glass-box">
<div class="profile-card">

    <img id="profilePic" src="https://i.pravatar.cc/150?img=3">

    <h3 id="profileName"></h3>

    <input type="file" id="uploadPic" onchange="uploadProfilePic()">

</div>


<h2 id="welcomeUser"></h2>
<div class="notes-box">
    <h2>Your Notes</h2>

    <input type="text" id="noteInput" placeholder="Write something...">

    <button onclick="addNote()">Add Note</button>

    <ul id="notesList"></ul>
</div>


<div class="cards">

<div class="card">👤 Profile</div>

<div class="stats">

    <div class="card">📝 Notes<br><span id="noteCount">0</span></div>

    <div class="card">👤 User<br><span id="userNameCard"></span></div>

    <div class="card">🔥 Status<br>Active</div>

</div>
<div class="card">📝 Notes</div>
<div class="card">⚙ Settings</div>

</div>

<button onclick="logout()" class="logout">
Logout
</button>

</div>

<script src="script.js"></script>
</body>
</html>
